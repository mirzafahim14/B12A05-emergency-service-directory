<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emergency Service Directory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#edf4ed] font-sans text-[#1f2937]">

  <nav class="bg-[#f3f4f6] border-b border-gray-200">
    <div class="max-w-[1400px] mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="./assets/logo.png" alt="Logo" class="w-12 h-12 object-contain" />
        <div class="leading-5">
          <h1 class="text-[20px] md:text-[22px] font-extrabold text-[#0b6b47]">Emergency</h1>
          <h1 class="text-[20px] md:text-[22px] font-extrabold text-[#0b6b47]">Service</h1>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 bg-[#e7f4e8] rounded-full px-5 py-2 min-w-[76px] justify-center">
          <span id="heartCount" class="font-bold text-[16px]">0</span>
          <img src="./assets/heart.png" alt="heart" class="w-5 h-5" />
        </div>

        <div class="flex items-center gap-2 bg-[#fff7df] rounded-full px-5 py-2 min-w-[92px] justify-center">
          <span id="coinCount" class="font-bold text-[16px]">100</span>
          <img src="./assets/coin.png" alt="coin" class="w-5 h-5" />
        </div>

        <div class="bg-[#10b245] text-white rounded-full px-6 py-2 font-semibold text-[15px] min-w-[102px] text-center">
          <span id="copyCount">0</span> Copy
        </div>
      </div>
    </div>
  </nav>

  <section class="bg-gradient-to-r from-[#013223] via-[#015f42] to-[#013223] text-white">
    <div class="max-w-[1400px] mx-auto px-4 py-8 md:py-10 text-center">
      <img src="./assets/logo-dark.png" alt="Hero Logo" class="w-16 h-16 md:w-20 md:h-20 mx-auto object-contain" />
     <h2 class="mt-3 text-[28px] md:text-[42px] font-extrabold">জরুরি সেবা ডিরেক্টরি</h2>
      <p class="mt-2 text-[13px] md:text-[18px] font-semibold">
        Government Emergency Services at Your Fingertip – A Project by Government of the People's Republic of Bangladesh
      </p>
    </div>
  </section>

  <main class="max-w-[1400px] mx-auto px-4 md:px-6 py-8">
    <div class="grid grid-cols-1 xl:grid-cols-[1fr_300px] gap-5">

      <section>
        <div id="cardContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
      </section>

      <aside class="bg-white rounded-2xl border border-[#e5e7eb] p-4 h-fit">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2">
            <span class="text-[18px]">🕒</span>
            <h3 class="text-[22px] font-semibold text-[#222]">Call History</h3>
          </div>
          <button id="clearHistoryBtn" class="bg-[#10b245] hover:bg-[#0d9c3d] text-white font-semibold px-6 py-2 rounded-full text-[14px]">
            Clear
          </button>
        </div>

        <div id="historyList" class="space-y-3"></div>
      </aside>
    </div>
  </main>

  <script>
    const services = [
      {
        id: 1,
        name: "National Emergency Number",
        english: "National Emergency",
        number: "999",
        category: "All",
        icon: "./assets/emergency.png"
      },
      {
        id: 2,
        name: "Police Helpline Number",
        english: "Police",
        number: "999",
        category: "Police",
        icon: "./assets/police.png"
      },
      {
        id: 3,
        name: "Fire Service Number",
        english: "Fire Service",
        number: "999",
        category: "Fire",
        icon: "./assets/fire-service.png"
      },
      {
        id: 4,
        name: "Ambulance Service",
        english: "Ambulance",
        number: "1994-999999",
        category: "Health",
        icon: "./assets/ambulance.png"
      },
      {
        id: 5,
        name: "Women & Child Helpline",
        english: "Women & Child Helpline",
        number: "109",
        category: "Help",
        icon: "./assets/emergency.png"
      },
      {
        id: 6,
        name: "Anti-Corruption Helpline",
        english: "Anti-Corruption",
        number: "106",
        category: "Govt.",
        icon: "./assets/emergency.png"
      },
      {
        id: 7,
        name: "Electricity Helpline",
        english: "Electricity Outage",
        number: "16216",
        category: "Electricity",
        icon: "./assets/emergency.png"
      },
      {
        id: 8,
        name: "Brac Helpline",
        english: "Brac",
        number: "16445",
        category: "NGO",
        icon: "./assets/brac.png"
      },
      {
        id: 9,
        name: "Bangladesh Railway Helpline",
        english: "Bangladesh Railway",
        number: "163",
        category: "Travel",
        icon: "./assets/Bangladesh-Railway.png"
      }
    ];

    let heartCount = 0;
    let coinCount = 100;
    let copyCount = 0;

    const heartCountEl = document.getElementById("heartCount");
    const coinCountEl = document.getElementById("coinCount");
    const copyCountEl = document.getElementById("copyCount");
    const cardContainer = document.getElementById("cardContainer");
    const historyList = document.getElementById("historyList");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");

    function updateCounts() {
      heartCountEl.textContent = heartCount;
      coinCountEl.textContent = coinCount;
      copyCountEl.textContent = copyCount;
    }

    function getCurrentTime() {
      return new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
      });
    }

    function createCard(service) {
      const card = document.createElement("div");

      card.className = "bg-[#f9fafb] border border-[#dfe7df] rounded-2xl shadow-sm p-5 min-h-[225px] flex flex-col justify-between";

      card.innerHTML = `
        <div>
          <div class="flex items-start justify-between mb-4">
            <div class="w-11 h-11 rounded-xl bg-[#fdecec] flex items-center justify-center">
              <img src="${service.icon}" alt="${service.english}" class="w-6 h-6 object-contain" />
            </div>

            <button class="heart-btn text-[22px] text-gray-400 hover:text-red-500 transition" data-id="${service.id}">
              ♡
            </button>
          </div>

          <h3 class="text-[17px] md:text-[18px] font-extrabold text-[#1f1f1f] leading-6">
            ${service.name}
          </h3>

          <p class="text-[#6b7280] text-[15px] mt-1">
            ${service.english}
          </p>

          <h4 class="text-[22px] md:text-[24px] font-extrabold mt-4 text-[#111827]">
            ${service.number}
          </h4>

          <span class="inline-block mt-2 bg-[#ececec] text-[#7a7a7a] text-[13px] px-3 py-1 rounded-full">
            ${service.category}
          </span>
        </div>

        <div class="grid grid-cols-2 gap-2 mt-5">
          <button
            class="copy-btn h-[42px] border border-[#d1d5db] rounded-lg text-[#6b7280] text-[14px] font-medium bg-white hover:bg-gray-50 transition"
            data-name="${service.name}"
            data-number="${service.number}"
          >
            📋 Copy
          </button>

          <button
            class="call-btn h-[42px] rounded-lg text-white text-[14px] font-medium bg-[#10b245] hover:bg-[#0d9c3d] transition"
            data-name="${service.name}"
            data-number="${service.number}"
          >
            📞 Call
          </button>
        </div>
      `;

      return card;
    }

    function renderCards() {
      cardContainer.innerHTML = "";
      services.forEach(service => {
        cardContainer.appendChild(createCard(service));
      });
    }

    function addHistory(name, number) {
      const item = document.createElement("div");

      item.className = "bg-[#f9fafb] rounded-xl px-4 py-3 flex items-start justify-between gap-3 border border-[#f0f0f0]";

      item.innerHTML = `
        <div>
          <h4 class="font-bold text-[14px] leading-4 text-[#1f1f1f]">${name}</h4>
          <p class="text-[#6b7280] text-[14px] mt-1">${number}</p>
        </div>
        <div class="text-[12px] text-[#4b5563] whitespace-nowrap pt-1">
          ${getCurrentTime()}
        </div>
      `;

      historyList.prepend(item);
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      }
    }

    cardContainer.addEventListener("click", async function (event) {
      const heartBtn = event.target.closest(".heart-btn");
      const copyBtn = event.target.closest(".copy-btn");
      const callBtn = event.target.closest(".call-btn");

      if (heartBtn) {
        heartCount++;
        updateCounts();
      }

      if (copyBtn) {
        const number = copyBtn.dataset.number;
        copyCount++;
        updateCounts();
        await copyToClipboard(number);
        alert("Copied hotline number: " + number);
      }

      if (callBtn) {
        const name = callBtn.dataset.name;
        const number = callBtn.dataset.number;

        if (coinCount < 20) {
          alert("Not enough coins. You need at least 20 coins to make a call.");
          return;
        }

        coinCount -= 20;
        updateCounts();
        alert(`Calling ${name}\n${number}`);
        addHistory(name, number);
      }
    });

    clearHistoryBtn.addEventListener("click", function () {
      historyList.innerHTML = "";
    });

    renderCards();
    updateCounts();
  </script>
</body>
</html>
